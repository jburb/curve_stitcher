<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kid-Friendly Curve Stitching</title>

<!-- Paper.js -->
<script src="https://unpkg.com/paper@0.12.17/dist/paper-full.js"></script>

<style>
  body {
    margin: 0;
    font-family: "Nunito", sans-serif;
    background: #f7f7fb;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* --- TOP SHAPE PICKER --- */
  #shape-bar {
    display: flex;
    gap: 16px;
    padding: 12px;
    background: #fff;
    border-bottom: 2px solid #eee;
    align-items: center;
  }
  .shape-btn {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: #f0f0ff;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 26px;
    transition: transform 0.15s;
  }
  .shape-btn:hover {
    transform: scale(1.15);
  }

  #gear {
    margin-left: auto;
    font-size: 28px;
    cursor: pointer;
  }

  /* --- CANVAS AREA --- */
  #canvas-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  canvas {
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 12px;
  }

  /* --- BOTTOM SLIDERS --- */
  #sliders {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    padding: 12px;
    background: #fff;
    border-top: 2px solid #eee;
    justify-content: center;
  }
  .kid-thread-tools {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }
  .kid-thread-btn {
    border: 1px solid #d4dbe8;
    background: #ffffff;
    color: #213047;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .kid-thread-btn:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }
  .kid-thread-picker {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #4f5f77;
    background: #eef3ff;
    border: 1px solid #d7e0f3;
    border-radius: 999px;
    padding: 4px 8px;
    position: relative;
  }
  .kid-thread-toggle {
    border: 1px solid #cfd9ef;
    border-radius: 999px;
    background: #fff;
    color: #213047;
    font-size: 12px;
    padding: 2px 8px;
    min-width: 180px;
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
  }
  .kid-thread-toggle:disabled {
    cursor: not-allowed;
    opacity: 0.6;
  }
  .kid-thread-current {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .thread-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.2);
    flex: 0 0 auto;
    background: #1982c4;
  }
  .kid-thread-current-label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .kid-thread-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 230px;
    max-height: 220px;
    overflow-y: auto;
    background: #fff;
    border: 1px solid #d7e0f3;
    border-radius: 12px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    padding: 6px;
    z-index: 20;
  }
  .kid-thread-menu[hidden] {
    display: none;
  }
  .kid-thread-option {
    width: 100%;
    border: 0;
    background: transparent;
    border-radius: 8px;
    padding: 6px 8px;
    text-align: left;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #213047;
    cursor: pointer;
  }
  .kid-thread-option:hover {
    background: #f2f6ff;
  }
  .kid-thread-option.active {
    background: #e8f0ff;
  }
  .slider-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 14px;
  }
  .slider-label {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-value {
    min-width: 28px;
    text-align: center;
    padding: 1px 8px;
    border-radius: 999px;
    background: #f1f3fa;
    color: #334;
    font-size: 12px;
    line-height: 1.5;
  }
  input[type=range] {
    width: 160px;
  }

  /* --- RIGHT COLOR PALETTE --- */
  #palette {
    position: absolute;
    right: 12px;
    top: 100px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .color-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 0 4px rgba(0,0,0,0.2);
  }

  /* --- FLOATING BUTTONS --- */
  #float-buttons {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 12px;
  }
  .float-btn {
    padding: 10px 16px;
    background: #fff;
    border-radius: 12px;
    border: 2px solid #ddd;
    cursor: pointer;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  /* --- ADVANCED PANEL --- */
  #advanced-panel {
    position: absolute;
    top: 0;
    right: -320px;
    width: 300px;
    height: 100%;
    background: #fafafa;
    border-left: 2px solid #ddd;
    padding: 16px;
    transition: right 0.3s;
    overflow-y: auto;
  }
  #advanced-panel.open {
    right: 0;
  }

  #advanced-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  #close-advanced {
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 8px;
    padding: 4px 10px;
    cursor: pointer;
  }

  .shape-btn.active {
    outline: 3px solid #1982c4;
    outline-offset: 2px;
  }

  .thread-card {
    background: #fff;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 12px;
    cursor: pointer;
  }

  .thread-card.selected {
    border-color: #1982c4;
    box-shadow: 0 0 0 2px rgba(25, 130, 196, 0.15);
  }

  .jump-help {
    font-size: 12px;
    color: #666;
    margin: 4px 0;
  }

  .jump-preset-row {
    display: flex;
    gap: 6px;
    margin: 4px 0;
  }

  .jump-preset-row select {
    flex: 1;
  }
</style>
</head>

<body>

<!-- SHAPE PICKER -->
<div id="shape-bar">
  <div class="shape-btn" data-shape="circle">⭕</div>
  <div class="shape-btn" data-shape="triangle">🔺</div>
  <div class="shape-btn" data-shape="square">⬜</div>
  <div class="shape-btn" data-shape="star">⭐</div>
  <div class="shape-btn" data-shape="heart">❤️</div>
  <div id="gear">⚙️</div>
</div>

<!-- CANVAS -->
<div id="canvas-container">
  <canvas id="myCanvas" resize width="600" height="600"></canvas>
</div>

<!-- SLIDERS -->
<div id="sliders">
  <div class="kid-thread-tools">
    <button id="add-magic-thread" class="kid-thread-btn" type="button">Add Thread</button>
    <button id="remove-last-thread" class="kid-thread-btn" type="button">Remove Last Thread</button>
    <div class="kid-thread-picker" id="kid-thread-picker">Stitching:
      <button id="kid-thread-toggle" class="kid-thread-toggle" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span class="kid-thread-current">
          <span class="thread-swatch" id="kid-thread-active-swatch"></span>
          <span class="kid-thread-current-label" id="kid-thread-active-label">Thread 1</span>
        </span>
        <span aria-hidden="true">▾</span>
      </button>
      <div id="kid-thread-menu" class="kid-thread-menu" role="listbox" hidden></div>
    </div>
  </div>
  <div class="slider-block">
    <div class="slider-label">🔵 Holes <span class="slider-value" id="holes-value">40</span></div>
    <input id="holes" type="range" min="3" max="200" value="40">
  </div>
  <div class="slider-block">
    <div class="slider-label">🟣 Jump <span class="slider-value" id="jump-value">7</span></div>
    <input id="jump" type="range" min="1" max="100" value="7">
  </div>
  <div class="slider-block">
    <div class="slider-label">🟠 Width <span class="slider-value" id="width-value">2</span></div>
    <input id="width" type="range" min="1" max="10" value="2">
  </div>
</div>

<!-- COLOR PALETTE -->
<div id="palette">
  <div class="color-dot" style="background:#ff595e" data-color="#ff595e"></div>
  <div class="color-dot" style="background:#ffca3a" data-color="#ffca3a"></div>
  <div class="color-dot" style="background:#8ac926" data-color="#8ac926"></div>
  <div class="color-dot" style="background:#1982c4" data-color="#1982c4"></div>
  <div class="color-dot" style="background:#6a4c93" data-color="#6a4c93"></div>
  <div class="color-dot" style="background:linear-gradient(45deg, red, orange, yellow, green, blue, purple)" data-color="rainbow"></div>
</div>

<!-- FLOATING BUTTONS -->
<div id="float-buttons">
  <div class="float-btn" id="animate">▶ Watch it stitch</div>
  <div class="float-btn" id="surprise">🎲 Surprise me</div>
</div>

<!-- ADVANCED PANEL -->
<div id="advanced-panel">
  <div id="advanced-header">
    <h3>Threads</h3>
    <button id="close-advanced" type="button">Close</button>
  </div>
  <button id="add-thread">Add Thread</button>
  <div id="thread-controls"></div>
</div>

<script>
paper.install(window);
paper.setup('myCanvas');

/* ------------------------------
   BASIC STATE
------------------------------ */
var holesSlider = document.getElementById('holes');
var jumpSlider  = document.getElementById('jump');
var widthSlider = document.getElementById('width');
var addMagicThreadBtn = document.getElementById('add-magic-thread');
var removeLastThreadBtn = document.getElementById('remove-last-thread');
var kidThreadPicker = document.getElementById('kid-thread-picker');
var kidThreadToggle = document.getElementById('kid-thread-toggle');
var kidThreadMenu = document.getElementById('kid-thread-menu');
var kidThreadActiveSwatch = document.getElementById('kid-thread-active-swatch');
var kidThreadActiveLabel = document.getElementById('kid-thread-active-label');
var holesValue  = document.getElementById('holes-value');
var jumpValue   = document.getElementById('jump-value');
var widthValue  = document.getElementById('width-value');
var animateBtn  = document.getElementById('animate');
var surpriseBtn = document.getElementById('surprise');
var gearBtn     = document.getElementById('gear');
var closeAdvancedBtn = document.getElementById('close-advanced');
var advancedPanel = document.getElementById('advanced-panel');

var threads = [
  {
    jump: 7,
    width: 2,
    color: '#1982c4',
    sequence: null,
    jumpMode: 'fixed',
    jumpFormula: 'jump',
    jumpSequence: ''
  }
];
var selectedThreadIndex = 0;

var points = [];
var animationActive = false;

var magicThreadColors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#f15bb5'];

function updateKidControlValues() {
  holesValue.textContent = holesSlider.value;
  jumpValue.textContent = jumpSlider.value;
  widthValue.textContent = widthSlider.value;
}

function createThread(config) {
  return {
    jump: config.jump,
    width: config.width,
    color: config.color,
    sequence: null,
    jumpMode: 'fixed',
    jumpFormula: 'jump',
    jumpSequence: ''
  };
}

function buildMagicThread() {
  var baseIndex = threads.length ? Math.max(0, selectedThreadIndex) : 0;
  var base = threads[baseIndex] || createThread({ jump: 7, width: 2, color: '#1982c4' });
  var jumpShift = (Math.floor(Math.random() * 7) + 2);
  var nextJump = base.jump + jumpShift;
  if (nextJump > 100) nextJump = ((nextJump - 1) % 100) + 1;

  var widthShift = Math.random() < 0.5 ? 0 : 1;
  var nextWidth = Math.min(10, Math.max(1, base.width + widthShift));

  var colorPick = magicThreadColors[Math.floor(Math.random() * magicThreadColors.length)];
  if (threads.length && threads[threads.length - 1].color === colorPick) {
    colorPick = magicThreadColors[(magicThreadColors.indexOf(colorPick) + 1) % magicThreadColors.length];
  }

  return createThread({
    jump: nextJump,
    width: nextWidth,
    color: colorPick
  });
}

function applyThreadSwatchStyle(element, color) {
  if (!element) return;
  if (color === 'rainbow') {
    element.style.background = 'linear-gradient(45deg, red, orange, yellow, green, blue, purple)';
  } else {
    element.style.background = color || '#1982c4';
  }
}

function refreshKidThreadPicker() {
  kidThreadMenu.innerHTML = '';
  removeLastThreadBtn.disabled = threads.length <= 1;

  if (!threads.length) {
    kidThreadToggle.disabled = true;
    kidThreadActiveLabel.textContent = 'No threads';
    applyThreadSwatchStyle(kidThreadActiveSwatch, '#cccccc');
    return;
  }

  kidThreadToggle.disabled = false;

  for (var i = 0; i < threads.length; i++) {
    var thread = threads[i];
    var option = document.createElement('button');
    option.type = 'button';
    option.className = 'kid-thread-option' + (i === selectedThreadIndex ? ' active' : '');
    option.setAttribute('role', 'option');
    option.setAttribute('aria-selected', i === selectedThreadIndex ? 'true' : 'false');
    option.dataset.index = String(i);

    var swatch = document.createElement('span');
    swatch.className = 'thread-swatch';
    applyThreadSwatchStyle(swatch, thread.color);

    var label = document.createElement('span');
    var colorLabel = thread.color === 'rainbow' ? 'Rainbow' : thread.color.toUpperCase();
    label.textContent = 'Thread ' + (i + 1) + ' (' + colorLabel + ')';

    option.appendChild(swatch);
    option.appendChild(label);
    kidThreadMenu.appendChild(option);
  }

  var selectedIndex = getKidTargetThreadIndex();
  var selectedThread = threads[selectedIndex];
  if (selectedThread) {
    var selectedLabel = selectedThread.color === 'rainbow' ? 'Rainbow' : selectedThread.color.toUpperCase();
    kidThreadActiveLabel.textContent = 'Thread ' + (selectedIndex + 1) + ' (' + selectedLabel + ')';
    applyThreadSwatchStyle(kidThreadActiveSwatch, selectedThread.color);
  }
}

function getKidTargetThreadIndex() {
  if (!threads.length) return -1;
  if (selectedThreadIndex >= 0 && selectedThreadIndex < threads.length) {
    return selectedThreadIndex;
  }
  return 0;
}

function syncKidControlsFromSelectedThread() {
  var index = getKidTargetThreadIndex();
  refreshKidThreadPicker();
  if (index < 0) return;
  jumpSlider.value = threads[index].jump;
  widthSlider.value = threads[index].width;
  updateKidControlValues();
}

/* ------------------------------
   RAINBOW HELPER
------------------------------ */
function rainbowColor(t) {
  return new Color({ hue: t * 360, saturation: 1, brightness: 1 });
}

/* ------------------------------
   SHAPE GENERATION
------------------------------ */
var currentShape = "circle";

function polygonPoint(theta, sides, radius, center) {
  var sector = (2 * Math.PI) / sides;
  var a = ((theta % sector) + sector) % sector - sector / 2;
  var r = radius * Math.cos(Math.PI / sides) / Math.cos(a);
  return new Point(
    center.x + r * Math.cos(theta),
    center.y + r * Math.sin(theta)
  );
}

function shapePoint(i, n, center, radius) {
  var t = (2 * Math.PI * i) / n;

  if (currentShape === 'triangle') {
    return polygonPoint(t - Math.PI / 2, 3, radius, center);
  }

  if (currentShape === 'square') {
    var c = Math.cos(t);
    var s = Math.sin(t);
    var m = Math.max(Math.abs(c), Math.abs(s));
    return new Point(
      center.x + (radius * c) / m,
      center.y + (radius * s) / m
    );
  }

  if (currentShape === 'star') {
    var starRadius = radius * (0.62 + 0.38 * Math.cos(5 * t));
    return new Point(
      center.x + starRadius * Math.cos(t - Math.PI / 2),
      center.y + starRadius * Math.sin(t - Math.PI / 2)
    );
  }

  if (currentShape === 'heart') {
    var x = 16 * Math.pow(Math.sin(t), 3);
    var y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    var scale = radius / 18;
    return new Point(
      center.x + x * scale,
      center.y - y * scale
    );
  }

  return new Point(
    center.x + radius * Math.cos(t),
    center.y + radius * Math.sin(t)
  );
}

function computePoints() {
  var n = parseInt(holesSlider.value, 10);
  var center = view.center;
  var radius = Math.min(view.size.width, view.size.height) * 0.35;

  points = [];

  for (var i = 0; i < n; i++) {
    points.push(shapePoint(i, n, center, radius));
  }
}

/* ------------------------------
   DRAWING THREADS
------------------------------ */
function computeSequence(thread) {
  var n = points.length;

  if (thread.sequence && thread.sequence.type === 'custom') {
    return thread.sequence.list;
  }

  var jumpMode = thread.jumpMode || 'fixed';
  var visited = new Array(n).fill(false);
  var current = 0;
  var prev = 0;
  var seq = [];
  var maxSteps = n * 4;

  function normalizeJump(value) {
    var k = Math.round(Number(value));
    if (!isFinite(k)) return 1;
    k = k % n;
    if (k === 0) return 1;
    return k;
  }

  function parseJumpSequence(text) {
    if (!text) return [];
    return text
      .split(/[\s,]+/)
      .map(Number)
      .filter((num) => isFinite(num))
      .map((num) => Math.round(num))
      .filter((num) => num !== 0);
  }

  var jumpResolver;
  if (jumpMode === 'sequence') {
    var stepList = parseJumpSequence(thread.jumpSequence);
    jumpResolver = function(i) {
      if (!stepList.length) return normalizeJump(thread.jump);
      return normalizeJump(stepList[i % stepList.length]);
    };
  } else if (jumpMode === 'formula') {
    var formula = (thread.jumpFormula || 'jump').trim();
    jumpResolver = function(i, currentIndex, previousIndex) {
      try {
        var evaluate = new Function('i', 'n', 'current', 'prev', 'jump', 'return (' + formula + ');');
        return normalizeJump(evaluate(i, n, currentIndex, previousIndex, thread.jump));
      } catch (err) {
        return normalizeJump(thread.jump);
      }
    };
  } else {
    jumpResolver = function() {
      return normalizeJump(thread.sequence ? thread.sequence.k : thread.jump);
    };
  }

  for (var i = 0; i < maxSteps; i++) {
    if (visited[current]) break;
    visited[current] = true;
    seq.push(current);
    var step = jumpResolver(i, current, prev);
    prev = current;
    current = (current + step) % n;
    if (current < 0) current += n;
  }
  return seq;
}

function drawThread(thread) {
  var seq = computeSequence(thread);

  for (var i = 0; i < seq.length; i++) {
    var seg = new Path();
    seg.strokeWidth = thread.width;

    if (thread.color === 'rainbow') {
      seg.strokeColor = rainbowColor(i / seq.length);
    } else {
      seg.strokeColor = thread.color;
    }

    seg.add(points[seq[i]]);
    seg.add(points[seq[(i + 1) % seq.length]]);
  }
}

/* ------------------------------
   STATIC DRAW
------------------------------ */
function drawStatic() {
  project.activeLayer.removeChildren();
  computePoints();

  // Draw holes
  for (var i = 0; i < points.length; i++) {
    new Path.Circle(points[i], 3).fillColor = '#333';
  }

  // Draw threads
  for (var i = 0; i < threads.length; i++) {
    drawThread(threads[i]);
  }
}

/* ------------------------------
   ANIMATION
------------------------------ */
function animateStitch() {
  project.activeLayer.removeChildren();
  computePoints();

  // Draw holes
  for (var i = 0; i < points.length; i++) {
    new Path.Circle(points[i], 3).fillColor = '#333';
  }

  var threadIndex = 0;
  var seq = computeSequence(threads[threadIndex]);
  var step = 0;
  animationActive = true;

  view.onFrame = function() {
    if (!animationActive) return;

    if (step < seq.length - 1) {
      var seg = new Path();
      seg.strokeWidth = threads[threadIndex].width;

      if (threads[threadIndex].color === 'rainbow') {
        seg.strokeColor = rainbowColor(step / seq.length);
      } else {
        seg.strokeColor = threads[threadIndex].color;
      }

      seg.add(points[seq[step]]);
      seg.add(points[seq[step + 1]]);
      step++;
    } else {
      threadIndex++;
      if (threadIndex >= threads.length) {
        animationActive = false;
        return;
      }
      seq = computeSequence(threads[threadIndex]);
      step = 0;
    }
  };
}

/* ------------------------------
   THREAD UI
------------------------------ */
function renderThreadControls() {
  var container = document.getElementById('thread-controls');
  container.innerHTML = '';

  if (!threads.length) {
    selectedThreadIndex = -1;
    refreshKidThreadPicker();
    return;
  }
  if (selectedThreadIndex < 0 || selectedThreadIndex >= threads.length) {
    selectedThreadIndex = 0;
  }

  threads.forEach((thread, index) => {
    var div = document.createElement('div');
    div.className = 'thread-card' + (index === selectedThreadIndex ? ' selected' : '');

    div.innerHTML = `
      <strong>Thread ${index + 1}</strong><br>
      Color: <input type="color" value="${thread.color}" id="color-${index}"><br>
      Jump: <input type="range" min="1" max="100" value="${thread.jump}" id="jump-${index}"><br>
      Jump mode:
      <select id="jump-mode-${index}">
        <option value="fixed" ${thread.jumpMode === 'fixed' ? 'selected' : ''}>Fixed</option>
        <option value="formula" ${thread.jumpMode === 'formula' ? 'selected' : ''}>Formula</option>
        <option value="sequence" ${thread.jumpMode === 'sequence' ? 'selected' : ''}>Sequence</option>
      </select><br>
      Formula: <input type="text" value="${thread.jumpFormula || 'jump'}" id="jump-formula-${index}" placeholder="e.g. jump + i"><br>
      <div class="jump-help">Vars: i, n, current, prev, jump</div>
      <div class="jump-preset-row">
        <select id="jump-preset-${index}">
          <option value="">Preset formulas...</option>
          <option value="jump + i">Growing spiral (jump + i)</option>
          <option value="jump + (i % 5)">Wobble (jump + i % 5)</option>
          <option value="jump * ((i % 3) + 1)">Pulse (jump * ((i % 3) + 1))</option>
          <option value="(current % 7) + jump">Current-based ((current % 7) + jump)</option>
        </select>
        <button type="button" id="use-preset-${index}">Use</button>
      </div>
      Sequence: <input type="text" value="${thread.jumpSequence || ''}" id="jump-sequence-${index}" placeholder="e.g. 2,3,5,8"><br>
      Width: <input type="range" min="1" max="10" value="${thread.width}" id="width-${index}"><br>
      Rainbow: <input type="checkbox" id="rainbow-${index}" ${thread.color === 'rainbow' ? 'checked' : ''}><br>
      <button id="delete-${index}">Delete</button>
    `;

    container.appendChild(div);

    div.addEventListener('click', (event) => {
      if (event.target.closest('input, select, button')) return;
      selectedThreadIndex = index;
      renderThreadControls();
      syncKidControlsFromSelectedThread();
    });

    document.getElementById(`color-${index}`).addEventListener('input', e => {
      thread.color = e.target.value;
      syncKidControlsFromSelectedThread();
      drawStatic();
    });

    document.getElementById(`jump-${index}`).addEventListener('input', e => {
      thread.jump = parseInt(e.target.value, 10);
      if (index === getKidTargetThreadIndex()) {
        jumpSlider.value = thread.jump;
        updateKidControlValues();
      }
      drawStatic();
    });

    document.getElementById(`jump-mode-${index}`).addEventListener('change', e => {
      thread.jumpMode = e.target.value;
      renderThreadControls();
      drawStatic();
    });

    document.getElementById(`jump-formula-${index}`).addEventListener('input', e => {
      thread.jumpFormula = e.target.value;
      if (thread.jumpMode === 'formula') {
        drawStatic();
      }
    });

    document.getElementById(`use-preset-${index}`).addEventListener('click', () => {
      var preset = document.getElementById(`jump-preset-${index}`).value;
      if (!preset) return;
      thread.jumpFormula = preset;
      thread.jumpMode = 'formula';
      renderThreadControls();
      drawStatic();
    });

    document.getElementById(`jump-sequence-${index}`).addEventListener('input', e => {
      thread.jumpSequence = e.target.value;
      if (thread.jumpMode === 'sequence') {
        drawStatic();
      }
    });

    document.getElementById(`width-${index}`).addEventListener('input', e => {
      thread.width = parseInt(e.target.value, 10);
      if (index === getKidTargetThreadIndex()) {
        widthSlider.value = thread.width;
        updateKidControlValues();
      }
      drawStatic();
    });

    document.getElementById(`rainbow-${index}`).addEventListener('change', e => {
      thread.color = e.target.checked ? 'rainbow' : '#000000';
      syncKidControlsFromSelectedThread();
      drawStatic();
    });

    document.getElementById(`delete-${index}`).addEventListener('click', () => {
      threads.splice(index, 1);
      if (!threads.length) {
        selectedThreadIndex = -1;
      } else if (selectedThreadIndex >= threads.length) {
        selectedThreadIndex = threads.length - 1;
      }
      renderThreadControls();
      syncKidControlsFromSelectedThread();
      drawStatic();
    });
  });

  syncKidControlsFromSelectedThread();
}

/* ------------------------------
   EVENT LISTENERS
------------------------------ */
holesSlider.addEventListener('input', () => {
  updateKidControlValues();
  drawStatic();
});
jumpSlider.addEventListener('input', () => {
  var targetIndex = getKidTargetThreadIndex();
  if (targetIndex < 0) return;
  updateKidControlValues();
  threads[targetIndex].jump = parseInt(jumpSlider.value, 10);
  renderThreadControls();
  drawStatic();
});
widthSlider.addEventListener('input', () => {
  var targetIndex = getKidTargetThreadIndex();
  if (targetIndex < 0) return;
  updateKidControlValues();
  threads[targetIndex].width = parseInt(widthSlider.value, 10);
  renderThreadControls();
  drawStatic();
});

animateBtn.addEventListener('click', animateStitch);

surpriseBtn.addEventListener('click', () => {
  var targetIndex = getKidTargetThreadIndex();
  if (targetIndex < 0) return;
  holesSlider.value = Math.floor(Math.random() * 150) + 20;
  jumpSlider.value = Math.floor(Math.random() * 50) + 1;
  widthSlider.value = Math.floor(Math.random() * 8) + 1;
  updateKidControlValues();
  threads[targetIndex].jump = parseInt(jumpSlider.value, 10);
  threads[targetIndex].width = parseInt(widthSlider.value, 10);
  threads[targetIndex].color = 'rainbow';
  renderThreadControls();
  drawStatic();
});

gearBtn.addEventListener('click', () => {
  advancedPanel.classList.toggle('open');
});

closeAdvancedBtn.addEventListener('click', () => {
  advancedPanel.classList.remove('open');
});

document.querySelectorAll('.color-dot').forEach((dot) => {
  dot.addEventListener('click', () => {
    if (!threads.length) return;
    var targetIndex = selectedThreadIndex;
    if (targetIndex < 0 || targetIndex >= threads.length) {
      targetIndex = 0;
    }
    threads[targetIndex].color = dot.getAttribute('data-color') || '#1982c4';
    renderThreadControls();
    drawStatic();
  });
});

document.querySelectorAll('.shape-btn').forEach((btn) => {
  btn.addEventListener('click', () => {
    currentShape = btn.getAttribute('data-shape') || 'circle';
    document.querySelectorAll('.shape-btn').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    drawStatic();
  });
});

document.getElementById('add-thread').addEventListener('click', () => {
  threads.push(buildMagicThread());
  selectedThreadIndex = threads.length - 1;
  renderThreadControls();
  syncKidControlsFromSelectedThread();
  drawStatic();
});

kidThreadToggle.addEventListener('click', () => {
  var isOpen = !kidThreadMenu.hasAttribute('hidden');
  if (isOpen) {
    kidThreadMenu.setAttribute('hidden', '');
    kidThreadToggle.setAttribute('aria-expanded', 'false');
  } else {
    kidThreadMenu.removeAttribute('hidden');
    kidThreadToggle.setAttribute('aria-expanded', 'true');
  }
});

kidThreadMenu.addEventListener('click', (event) => {
  var option = event.target.closest('.kid-thread-option');
  if (!option) return;
  var nextIndex = parseInt(option.dataset.index, 10);
  if (!isFinite(nextIndex) || nextIndex < 0 || nextIndex >= threads.length) return;
  selectedThreadIndex = nextIndex;
  kidThreadMenu.setAttribute('hidden', '');
  kidThreadToggle.setAttribute('aria-expanded', 'false');
  renderThreadControls();
  syncKidControlsFromSelectedThread();
  drawStatic();
});

document.addEventListener('click', (event) => {
  if (kidThreadMenu.hasAttribute('hidden')) return;
  if (kidThreadPicker.contains(event.target)) return;
  kidThreadMenu.setAttribute('hidden', '');
  kidThreadToggle.setAttribute('aria-expanded', 'false');
});

addMagicThreadBtn.addEventListener('click', () => {
  threads.push(buildMagicThread());
  // Keep basic controls focused on the newest magic thread.
  selectedThreadIndex = threads.length - 1;
  renderThreadControls();
  syncKidControlsFromSelectedThread();
  drawStatic();
});

removeLastThreadBtn.addEventListener('click', () => {
  if (threads.length <= 1) return;
  threads.pop();
  selectedThreadIndex = threads.length - 1;
  renderThreadControls();
  syncKidControlsFromSelectedThread();
  drawStatic();
});

/* ------------------------------
   INITIALIZE
------------------------------ */
renderThreadControls();
document.querySelector('.shape-btn[data-shape="circle"]').classList.add('active');
updateKidControlValues();
refreshKidThreadPicker();
drawStatic();

</script>
</body>
</html>
